<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shubham Jawandhiya — Photography" />
  <title>Photography — Shubham Jawandhiya</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Theme: inline to prevent flash-of-wrong-theme -->
  <script>
    (function () {
      const saved = localStorage.getItem('sj-theme');
      const preferred = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', preferred);
    })();
  </script>

  <style>
    .photo-page-hero {
      padding: 8rem 3rem 3rem;
      border-bottom: 1px solid var(--line);
    }
    .photo-page-eyebrow {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .photo-page-title {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.1;
    }
    .photo-page-title em {
      font-style: italic;
      color: var(--ink-muted);
    }
    .photo-page-sub {
      font-family: var(--sans);
      font-size: 0.9rem;
      color: var(--ink-muted);
      font-weight: 300;
      margin-top: 1rem;
      max-width: 42ch;
    }
    .photo-page-grid-wrap {
      padding: 3rem;
    }
    .photo-count {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1.5rem;
    }
    @media (max-width: 900px) {
      .photo-page-hero { padding: 6rem 1.5rem 2rem; }
      .photo-page-grid-wrap { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ── NAVIGATION ─────────────────────────────────────────────────────────── -->
<nav>
  <a class="nav-logo" href="index.html">← SJ — diary</a>
  <ul class="nav-links">
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#work">Work</a></li>
    <li><a href="index.html#blog">Writing</a></li>
    <li><a href="photography.html" style="color: var(--accent);">Photography</a></li>
    <li><a href="index.html#contact">Contact</a></li>
    <li><button id="theme-toggle" aria-label="Toggle theme"></button></li>
  </ul>
</nav>

<!-- ── HERO ───────────────────────────────────────────────────────────────── -->
<div class="photo-page-hero fade-in">
  <p class="photo-page-eyebrow">04 — Visual Work</p>
  <h1 class="photo-page-title">Finding <em>frames</em><br>in everyday moments.</h1>
  <p class="photo-page-sub">Street corners, golden hours, overlooked scenes — photographs from places I've been.</p>
</div>

<!-- ── GRID ──────────────────────────────────────────────────────────────── -->
<div class="photo-page-grid-wrap">
  <p class="photo-count" id="photo-count"></p>
  <div class="photo-grid" id="photo-grid"></div>
</div>

<!-- ── FOOTER ─────────────────────────────────────────────────────────────── -->
<footer>
  <span class="footer-copy">© 2025 Shubham Jawandhiya. All rights reserved.</span>
  <span class="footer-sig">Made with intention.</span>
</footer>

<!-- ── PHOTO LIGHTBOX ─────────────────────────────────────────────────────── -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()" role="dialog" aria-modal="true" aria-label="Photo viewer">
  <button class="lightbox-close" onclick="closeLightbox()">Close ✕</button>
  <button class="lightbox-prev" onclick="lightboxPrev(event)">‹</button>
  <img id="lightbox-img" src="" alt="Full size photograph" />
  <button class="lightbox-next" onclick="lightboxNext(event)">›</button>
</div>

<!-- ── SCRIPTS ────────────────────────────────────────────────────────────── -->
<script src="js/theme.js"></script>
<script src="js/photography.js"></script>
<script src="js/main.js"></script>

<script>
  // Update count after render
  document.addEventListener('DOMContentLoaded', () => {
    const countEl = document.getElementById('photo-count');
    if (countEl) countEl.textContent = PHOTOS.length + ' photographs';
  });
</script>

</body>
</html>
